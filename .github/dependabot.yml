# Dependabot — keep dependencies current with low PR noise.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Python package (pyproject.toml: pydantic, httpx, optional keyring/mcp)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # roll all minor + patch bumps into one PR per week
      python-minor-patch:
        update-types: ["minor", "patch"]

  # VS Code extension (vscode-extension/package.json + package-lock.json)
  - package-ecosystem: "npm"
    directory: "/vscode-extension"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions — activates once you add workflows under .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
    commit-message:
      prefix: "ci"
