# Dependabot — keep dependencies current with the fewest possible PRs/branches.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
#
# Each ecosystem rolls ALL updates (major + minor + patch) into a single
# grouped PR per week, so dependency maintenance is one short-lived branch per
# ecosystem that auto-merges (see dependabot-auto-merge.yml) and auto-deletes.
version: 2
updates:
  # Python package (pyproject.toml: pydantic, httpx, optional keyring/mcp)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      python:
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]

  # VS Code extension (vscode-extension/package.json + package-lock.json)
  - package-ecosystem: "npm"
    directory: "/vscode-extension"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      npm:
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]

  # GitHub Actions (.github/workflows/*)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]
