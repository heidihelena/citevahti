name: pip-audit

# Dependency-CVE scanning. Installs CiteVahti + its runtime extras, then audits the
# RESOLVED dependency tree against the PyPI Advisory DB + OSV on every push/PR and
# weekly. Complements CodeQL (our code) and the ruff `S` rules (our patterns) with
# third-party CVE coverage. SHA-pinned, least-privilege; see SECURITY.md.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 5 * * 2"   # weekly, Tuesday (staggered from CodeQL's Monday)

permissions:
  contents: read

jobs:
  audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install the project + runtime extras (audit the real resolved tree)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[mcp,keyring,timestamp,update]"
      - name: Audit installed dependencies for known CVEs
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266  # v1.1.0
        with:
          local: true   # audit the installed environment (the concrete resolved versions)
          # Documented exception (NOT a blanket disable — every other advisory still gates):
          # GHSA-qp9x-wp8f-qgjj is in `tuf` 4.0.0, pulled in by the `update` extra. The fix is
          # tuf 7.0.0, but tufup (latest 0.10.0) hard-pins `tuf==4.0.*`, so it can't be bumped
          # until tufup updates upstream. Exposure is low: the flaw is Windows-only and needs a
          # malicious TUF repo with case-colliding delegations, and CiteVahti's auto-updater is
          # still an inert scaffold (no live update server/keys). Tracked: re-check when tufup
          # supports a patched tuf, and BEFORE enabling live auto-update. See docs/AUTO_UPDATE.md.
          ignore-vulns: |
            GHSA-qp9x-wp8f-qgjj
