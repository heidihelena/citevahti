name: Scorecard supply-chain security

# OpenSSF Scorecard: rates the repo's supply-chain posture (Branch-Protection,
# Token-Permissions, Pinned-Dependencies, Code-Review, Dependency-Update-Tool, …)
# and uploads findings (SARIF) to the Security tab. publish_results is on (public
# repo) so the score feeds the OpenSSF API and the README badge. SHA-pinned,
# least-privilege; see SECURITY.md.

on:
  branch_protection_rule:   # re-score when branch protection changes
  schedule:
    - cron: "27 5 * * 3"    # weekly, Wednesday (staggered from CodeQL/pip-audit)
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload the SARIF results to the Security tab
      id-token: write          # publish results to the OpenSSF API (enables the badge)
      actions: read            # read workflow run metadata
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false
      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
          # Branch-Protection (and a few other checks) need repo-admin read, which the
          # default GITHUB_TOKEN can't grant. Add a fine-grained PAT as the SCORECARD_TOKEN
          # repo secret (Administration: read-only on this repo) and those checks score fully.
          # Until then this falls back to github.token — same as before — so it's safe to ship.
          repo_token: ${{ secrets.SCORECARD_TOKEN || github.token }}
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5
      - name: Upload to the Security tab
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        with:
          sarif_file: results.sarif
