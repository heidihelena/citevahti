name: Build desktop extension (.mcpb)

# Builds the no-Python CiteVahti .mcpb on Windows and Linux (PyInstaller can't
# cross-compile, so each OS is built on its own runner). macOS is built + signed +
# notarized locally (needs the Developer ID cert), so it's intentionally NOT here.
# Windows/Linux binaries are UNSIGNED (beta): Windows may show a SmartScreen warning;
# Linux has no notarization concept.
on:
  workflow_dispatch: {}
  push:
    branches: [feat/desktop-extension-mcpb]
    paths: ['.github/workflows/desktop-extension-build.yml']

permissions:
  contents: write   # to attach assets to the release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            binname: citevahti-mcp.exe
            asset: citevahti-0.15.0-windows-x64.mcpb
          - os: ubuntu-latest
            platform: linux
            binname: citevahti-mcp
            asset: citevahti-0.15.0-linux-x64.mcpb
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: desktop-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install "citevahti[mcp]==0.15.0" pyinstaller
      - name: Freeze standalone binary
        run: |
          pyinstaller --onefile --name citevahti-mcp \
            --collect-submodules mcp.server \
            --collect-data mcp \
            --collect-submodules citevahti \
            --exclude-module mcp.cli \
            --exclude-module typer \
            server/pyi_entry.py
      - name: Stage + generate per-OS manifest
        env:
          PLATFORM: ${{ matrix.platform }}
          BINNAME: ${{ matrix.binname }}
        run: |
          python - <<'PY'
          import json, shutil, os, pathlib
          plat = os.environ["PLATFORM"]; binname = os.environ["BINNAME"]
          m = json.load(open("manifest.binary.json"))
          m["server"]["entry_point"] = f"server/{binname}"
          m["server"]["mcp_config"]["command"] = "${__dirname}/server/" + binname
          m["compatibility"] = {"platforms": [plat]}
          stage = pathlib.Path("build/ci-stage")
          if stage.exists(): shutil.rmtree(stage)
          (stage / "server").mkdir(parents=True)
          json.dump(m, open(stage / "manifest.json", "w"), indent=2)
          built = "dist/citevahti-mcp.exe" if binname.endswith(".exe") else "dist/citevahti-mcp"
          shutil.copy(built, stage / "server" / binname)
          shutil.copy("icon.png", stage / "icon.png")
          print("staged for", plat)
          PY
      - name: Pack .mcpb
        run: |
          mkdir -p out
          npx --yes @anthropic-ai/mcpb pack build/ci-stage "out/${{ matrix.asset }}"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: desktop-extension/out/${{ matrix.asset }}
      - name: Attach to release v0.15.0-desktop
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.15.0-desktop
          files: desktop-extension/out/${{ matrix.asset }}
