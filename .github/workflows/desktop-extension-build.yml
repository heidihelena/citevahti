name: Build desktop bundles (.mcpb + macOS app)

# Builds the no-Python CiteVahti .mcpb on Windows, Linux, and macOS (PyInstaller can't
# cross-compile, so each OS is built on its own runner) — plus the standalone native
# macOS desktop app (CiteVahti.app) in the `macos-app` job.
# Windows/Linux binaries are UNSIGNED (beta): Windows may show a SmartScreen warning;
# Linux has no notarization concept.
#
# macOS is signed + notarized IN CI, gated on repo secrets (a macOS binary downloaded
# without a Developer ID signature + notarization is blocked by Gatekeeper). Add these
# six secrets once (Settings → Secrets and variables → Actions) — see desktop-extension/BUILD.md:
#   MACOS_CERT_P12_BASE64   base64 of your "Developer ID Application" cert export (.p12)
#   MACOS_CERT_PASSWORD     the .p12 export password
#   MACOS_SIGN_IDENTITY     e.g. "Developer ID Application: Your Name (TEAMID)"
#   MACOS_NOTARY_KEY_P8     contents of the App Store Connect API key (.p8)
#   MACOS_NOTARY_KEY_ID  +  MACOS_NOTARY_ISSUER   (the key id and issuer uuid)
# Until the secrets exist the macOS job builds an UNSIGNED bundle as an artifact only
# (never attached to a release), and logs a warning. Prerequisite: an Apple Developer
# Program enrollment ($99/yr).
#
# Triggers: publishing a GitHub release builds and attaches the assets to that
# release; manual dispatch takes a tag name to attach to (leave empty to only
# upload build artifacts). CiteVahti is installed from the repo checkout, not
# PyPI, so the release can ship before (or without) the PyPI upload.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to attach assets to (empty = artifacts only)'
        required: false
        default: ''
  release:
    types: [published]

permissions:
  contents: write   # to attach assets to the release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            binname: citevahti-mcp.exe
            suffix: windows-x64
          - os: ubuntu-latest
            platform: linux
            binname: citevahti-mcp
            suffix: linux-x64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: desktop-extension
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          # build from the EXACT tag on a manual backfill, so a .mcpb attached to vX.Y.Z
          # is built from vX.Y.Z (not from later main). On a release event github.ref is
          # already the tag. (Provenance: the wheel, the source archive, and the desktop
          # extension must represent the same commit.)
          ref: ${{ inputs.release_tag != '' && inputs.release_tag || github.ref }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'
      - name: Read extension version
        id: ver
        run: |
          VERSION=$(python -c "import json; print(json.load(open('manifest.binary.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "asset=citevahti-$VERSION-${{ matrix.suffix }}.mcpb" >> "$GITHUB_OUTPUT"
      - name: Install deps (from this checkout, not PyPI)
        run: |
          python -m pip install --upgrade pip
          pip install "..[mcp,keyring]" pyinstaller
      - name: Freeze standalone binary
        run: |
          pyinstaller --onefile --name citevahti-mcp \
            --collect-submodules mcp.server \
            --collect-data mcp \
            --collect-submodules citevahti \
            --collect-data citevahti \
            --collect-submodules keyring \
            --hidden-import pypandoc \
            --hidden-import docx \
            --exclude-module mcp.cli \
            --exclude-module typer \
            server/pyi_entry.py
      # Fail loudly if the freeze is missing what the standalone .mcpb needs at runtime:
      # keyring (keychain-stored Zotero keys) lives in the PYZ archive as a module; the
      # panel web assets are DATA files that land in the *.toc entries as paths. This
      # binary is the panel's own HTTP server — without the assets the panel is blank.
      - name: Verify freeze (keyring + panel web assets)
        run: |
          python - <<'PY'
          import pathlib, sys
          tocs = list(pathlib.Path("build/citevahti-mcp").glob("*.toc"))
          if not tocs:
              sys.exit("::error::no PyInstaller TOC files under build/citevahti-mcp — freeze layout changed?")
          blob = "".join(t.read_text(errors="replace") for t in tocs)
          blob = blob.replace("\\\\", "/").replace("\\", "/")   # windows-path tolerant
          missing = [what for what, needle in
                     (("keyring modules", "'keyring.backend'"),
                      ("panel web assets", "panel/web/index.html")) if needle not in blob]
          if missing:
              sys.exit(f"::error::frozen citevahti-mcp is missing {', '.join(missing)} — "
                       "the .mcpb would ship with a blank panel or dead Zotero connect.")
          print("verified: keyring + panel web assets frozen into citevahti-mcp")
          PY
      - name: Stage + generate per-OS manifest
        env:
          PLATFORM: ${{ matrix.platform }}
          BINNAME: ${{ matrix.binname }}
        run: |
          python - <<'PY'
          import json, shutil, os, pathlib
          plat = os.environ["PLATFORM"]; binname = os.environ["BINNAME"]
          m = json.load(open("manifest.binary.json"))
          m["server"]["entry_point"] = f"server/{binname}"
          m["server"]["mcp_config"]["command"] = "${__dirname}/server/" + binname
          m["compatibility"] = {"platforms": [plat]}
          stage = pathlib.Path("build/ci-stage")
          if stage.exists(): shutil.rmtree(stage)
          (stage / "server").mkdir(parents=True)
          json.dump(m, open(stage / "manifest.json", "w"), indent=2)
          built = "dist/citevahti-mcp.exe" if binname.endswith(".exe") else "dist/citevahti-mcp"
          shutil.copy(built, stage / "server" / binname)
          shutil.copy("icon.png", stage / "icon.png")
          print("staged for", plat)
          PY
      - name: Pack .mcpb
        run: |
          mkdir -p out
          npx --yes @anthropic-ai/mcpb pack build/ci-stage "out/${{ steps.ver.outputs.asset }}"
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: ${{ steps.ver.outputs.asset }}
          path: desktop-extension/out/${{ steps.ver.outputs.asset }}
      - name: Attach to release
        if: ${{ github.event_name == 'release' || inputs.release_tag != '' }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
          files: desktop-extension/out/${{ steps.ver.outputs.asset }}

  # macOS — signed + notarized when the repo secrets are present (see the header).
  # Without them the bundle is built UNSIGNED, uploaded as an artifact only (never
  # attached to a release, because Gatekeeper would block an unsigned download).
  macos:
    # Apple Silicon only. PyInstaller can't cross-compile, and the macos-13 (Intel/x64)
    # runner is being retired by GitHub — its job sat queued indefinitely and blocked the
    # release workflow from completing. Intel-Mac users install via pip, or run the arm64
    # build under Rosetta. macos-latest = Apple Silicon/arm64; signed + notarized.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: desktop-extension
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          ref: ${{ inputs.release_tag != '' && inputs.release_tag || github.ref }}   # build from the exact tag on backfill
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'
      - name: Detect signing secrets
        id: sign
        env:
          CERT: ${{ secrets.MACOS_CERT_P12_BASE64 }}
        run: |
          if [ -n "$CERT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::macOS signing secrets are not set — building an UNSIGNED bundle (artifact only, not attached to the release). See desktop-extension/BUILD.md."
          fi
      - name: Read extension version
        id: ver
        run: |
          VERSION=$(python -c "import json; print(json.load(open('manifest.binary.json'))['version'])")
          echo "asset=citevahti-$VERSION-macos-${{ matrix.arch }}.mcpb" >> "$GITHUB_OUTPUT"
      - name: Install deps (from this checkout, not PyPI)
        run: |
          python -m pip install --upgrade pip
          pip install "..[mcp,keyring]" pyinstaller
      - name: Freeze standalone binary
        run: |
          pyinstaller --onefile --name citevahti-mcp \
            --collect-submodules mcp.server \
            --collect-data mcp \
            --collect-submodules citevahti \
            --collect-data citevahti \
            --collect-submodules keyring \
            --hidden-import pypandoc \
            --hidden-import docx \
            --exclude-module mcp.cli \
            --exclude-module typer \
            server/pyi_entry.py
      # Same fail-loud freeze check as the win/linux job (see the comment there).
      - name: Verify freeze (keyring + panel web assets)
        run: |
          python - <<'PY'
          import pathlib, sys
          tocs = list(pathlib.Path("build/citevahti-mcp").glob("*.toc"))
          if not tocs:
              sys.exit("::error::no PyInstaller TOC files under build/citevahti-mcp — freeze layout changed?")
          blob = "".join(t.read_text(errors="replace") for t in tocs)
          blob = blob.replace("\\\\", "/").replace("\\", "/")
          missing = [what for what, needle in
                     (("keyring modules", "'keyring.backend'"),
                      ("panel web assets", "panel/web/index.html")) if needle not in blob]
          if missing:
              sys.exit(f"::error::frozen citevahti-mcp is missing {', '.join(missing)} — "
                       "the .mcpb would ship with a blank panel or dead Zotero connect.")
          print("verified: keyring + panel web assets frozen into citevahti-mcp")
          PY
      - name: Import Developer ID certificate
        if: steps.sign.outputs.enabled == 'true'
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KP="actions-$RANDOM"
          # decode via python: tolerant of line-wrapped base64 and identical across
          # BSD/GNU base64, with a clear error if the secret isn't valid base64.
          python3 - <<'PY'
          import base64, os, sys
          raw = "".join(os.environ["CERT_P12_BASE64"].split())
          try:
              data = base64.b64decode(raw, validate=True)
          except Exception as e:
              sys.exit(f"::error::MACOS_CERT_P12_BASE64 is not valid base64 ({e}). "
                       "Re-export the Developer ID cert as .p12, then run "
                       "`base64 -i cert.p12 | pbcopy` and paste the WHOLE output as the secret.")
          if not data:
              sys.exit("::error::decoded .p12 is empty.")
          open("/tmp/cert.p12", "wb").write(data)
          print(f"decoded {len(data)} bytes")
          PY
          security create-keychain -p "$KP" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KP" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" build.keychain
          rm -f /tmp/cert.p12
      - name: Codesign (Developer ID + hardened runtime + entitlements)
        if: steps.sign.outputs.enabled == 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          codesign --force --options runtime --timestamp \
            --entitlements entitlements.plist --sign "$SIGN_IDENTITY" dist/citevahti-mcp
          codesign --verify --strict --verbose=2 dist/citevahti-mcp
          ./dist/citevahti-mcp --help >/dev/null && echo "signed binary runs"
      - name: Stage + generate macOS manifest
        run: |
          python - <<'PY'
          import json, shutil, pathlib
          m = json.load(open("manifest.binary.json"))
          m["server"]["entry_point"] = "server/citevahti-mcp"
          m["server"]["mcp_config"]["command"] = "${__dirname}/server/citevahti-mcp"
          m["compatibility"] = {"platforms": ["darwin"]}
          stage = pathlib.Path("build/ci-stage")
          if stage.exists(): shutil.rmtree(stage)
          (stage / "server").mkdir(parents=True)
          json.dump(m, open(stage / "manifest.json", "w"), indent=2)
          shutil.copy("dist/citevahti-mcp", stage / "server" / "citevahti-mcp")
          shutil.copy("icon.png", stage / "icon.png")
          print("staged for darwin")
          PY
      - name: Pack .mcpb
        run: |
          mkdir -p out
          npx --yes @anthropic-ai/mcpb pack build/ci-stage "out/${{ steps.ver.outputs.asset }}"
      - name: Notarize (App Store Connect API key)
        if: steps.sign.outputs.enabled == 'true'
        env:
          KEY_P8: ${{ secrets.MACOS_NOTARY_KEY_P8 }}
          KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
        run: |
          # Accept MACOS_NOTARY_KEY_P8 in ANY form a paste might produce — raw PEM (with or
          # without intact newlines) or base64 of the .p8 — and rebuild a clean .p8, so a
          # mangled paste can't cause invalidP8 / invalidPrivateKeyContents.
          python3 - <<'PY'
          import base64, os, re, sys, textwrap
          val = os.environ["KEY_P8"].strip()
          try:
              if "PRIVATE KEY" in val:                       # raw PEM (maybe single-lined)
                  body = "".join(re.sub(r"-----[^-]*-----", "", val).split())
                  der = base64.b64decode(body)               # the DER key bytes
              else:                                          # base64 of the whole .p8 file
                  der = base64.b64decode("".join(val.split()), validate=True)
                  inner = der.decode("ascii", "ignore")
                  if "PRIVATE KEY" in inner:                 # it decoded to a PEM file → take its body
                      der = base64.b64decode("".join(re.sub(r"-----[^-]*-----", "", inner).split()))
          except Exception as e:
              sys.exit(f"::error::MACOS_NOTARY_KEY_P8 could not be parsed ({e}) — paste the .p8 "
                       "contents, or `base64 -i AuthKey_XXXX.p8 | pbcopy`.")
          pem = ("-----BEGIN PRIVATE KEY-----\n"
                 + "\n".join(textwrap.wrap(base64.b64encode(der).decode(), 64))
                 + "\n-----END PRIVATE KEY-----\n")
          open("/tmp/AuthKey.p8", "w").write(pem)
          print("rebuilt AuthKey.p8")
          PY
          # a .mcpb (zip) cannot be stapled; Gatekeeper checks the notarization ticket online
          xcrun notarytool submit "out/${{ steps.ver.outputs.asset }}" \
            --key /tmp/AuthKey.p8 --key-id "$KEY_ID" --issuer "$ISSUER" --wait
          rm -f /tmp/AuthKey.p8
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: ${{ steps.ver.outputs.asset }}
          path: desktop-extension/out/${{ steps.ver.outputs.asset }}
      - name: Attach to release (signed + notarized only)
        if: ${{ steps.sign.outputs.enabled == 'true' && (github.event_name == 'release' || inputs.release_tag != '') }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
          files: desktop-extension/out/${{ steps.ver.outputs.asset }}

  # macOS — the standalone NATIVE DESKTOP APP (CiteVahti.app: the loopback panel in a native
  # webview window, no Claude Desktop, no Python). Separate artifact from the .mcpb above.
  # Built by build-app.sh, then Developer-ID signed (deep, hardened runtime, same entitlements
  # as the .mcpb), notarized, and STAPLED (a .app can be stapled, unlike the .mcpb zip → the
  # ticket is offline-verifiable). Attached only when the signing secrets are present; without
  # them Gatekeeper would block the downloaded app, so it's an artifact only.
  macos-app:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: desktop-extension
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          ref: ${{ inputs.release_tag != '' && inputs.release_tag || github.ref }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'
      - name: Detect signing secrets
        id: sign
        env:
          CERT: ${{ secrets.MACOS_CERT_P12_BASE64 }}
        run: |
          if [ -n "$CERT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::macOS signing secrets are not set — building an UNSIGNED CiteVahti.app (artifact only, not attached to the release). See desktop-extension/BUILD.md."
          fi
      - name: Read version
        id: ver
        run: |
          VERSION=$(python -c "import json; print(json.load(open('manifest.binary.json'))['version'])")
          echo "asset=citevahti-$VERSION-macos-${{ matrix.arch }}.app.zip" >> "$GITHUB_OUTPUT"
      - name: Build CiteVahti.app (unsigned) from this checkout
        run: ./build-app.sh local
      - name: Import Developer ID certificate
        if: steps.sign.outputs.enabled == 'true'
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KP="actions-$RANDOM"
          python3 - <<'PY'
          import base64, os, sys
          raw = "".join(os.environ["CERT_P12_BASE64"].split())
          try:
              data = base64.b64decode(raw, validate=True)
          except Exception as e:
              sys.exit(f"::error::MACOS_CERT_P12_BASE64 is not valid base64 ({e}).")
          if not data:
              sys.exit("::error::decoded .p12 is empty.")
          open("/tmp/cert.p12", "wb").write(data)
          print(f"decoded {len(data)} bytes")
          PY
          security create-keychain -p "$KP" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KP" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" build.keychain
          rm -f /tmp/cert.p12
      - name: Codesign the .app (deep, Developer ID, hardened runtime, entitlements)
        if: steps.sign.outputs.enabled == 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          APP="build/app/dist/CiteVahti.app"
          codesign --force --deep --options runtime --timestamp \
            --entitlements entitlements.plist --sign "$SIGN_IDENTITY" "$APP"
          codesign --verify --strict --verbose=2 "$APP"
      - name: Zip for notarization (ditto preserves the bundle)
        run: |
          mkdir -p out
          ditto -c -k --keepParent "build/app/dist/CiteVahti.app" "out/${{ steps.ver.outputs.asset }}"
      - name: Notarize + staple (App Store Connect API key)
        if: steps.sign.outputs.enabled == 'true'
        env:
          KEY_P8: ${{ secrets.MACOS_NOTARY_KEY_P8 }}
          KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
        run: |
          python3 - <<'PY'
          import base64, os, re, sys, textwrap
          val = os.environ["KEY_P8"].strip()
          try:
              if "PRIVATE KEY" in val:
                  body = "".join(re.sub(r"-----[^-]*-----", "", val).split())
                  der = base64.b64decode(body)
              else:
                  der = base64.b64decode("".join(val.split()), validate=True)
                  inner = der.decode("ascii", "ignore")
                  if "PRIVATE KEY" in inner:
                      der = base64.b64decode("".join(re.sub(r"-----[^-]*-----", "", inner).split()))
          except Exception as e:
              sys.exit(f"::error::MACOS_NOTARY_KEY_P8 could not be parsed ({e}).")
          pem = ("-----BEGIN PRIVATE KEY-----\n"
                 + "\n".join(textwrap.wrap(base64.b64encode(der).decode(), 64))
                 + "\n-----END PRIVATE KEY-----\n")
          open("/tmp/AuthKey.p8", "w").write(pem)
          print("rebuilt AuthKey.p8")
          PY
          # notarize the zipped bundle, then STAPLE the .app (unlike the .mcpb, a .app takes a
          # stapled ticket → Gatekeeper passes offline) and re-zip the stapled app.
          xcrun notarytool submit "out/${{ steps.ver.outputs.asset }}" \
            --key /tmp/AuthKey.p8 --key-id "$KEY_ID" --issuer "$ISSUER" --wait
          rm -f /tmp/AuthKey.p8
          xcrun stapler staple "build/app/dist/CiteVahti.app"
          ditto -c -k --keepParent "build/app/dist/CiteVahti.app" "out/${{ steps.ver.outputs.asset }}"
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: ${{ steps.ver.outputs.asset }}
          path: desktop-extension/out/${{ steps.ver.outputs.asset }}
      - name: Attach to release (signed + notarized only)
        if: ${{ steps.sign.outputs.enabled == 'true' && (github.event_name == 'release' || inputs.release_tag != '') }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
          files: desktop-extension/out/${{ steps.ver.outputs.asset }}
