name: Publish to PyPI

# Token-free publishing via PyPI Trusted Publishing (OIDC) — no secret to store or leak.
# Triggered when you publish a GitHub Release. The tag should match the version in
# pyproject.toml (e.g. v0.16.0). One-time setup: add a Trusted Publisher on PyPI for this
# repo + workflow + the `pypi` environment (see docs/RELEASING.md).
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    name: build, check, publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Build + validate the artifacts
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
          # the panel ships its UI as package data — fail loudly if it's missing
          python - <<'PY'
          import glob, zipfile
          z = zipfile.ZipFile(glob.glob("dist/*.whl")[0])
          need = {"citevahti/panel/web/index.html", "citevahti/panel/web/app.js",
                  "citevahti/panel/web/styles.css"}
          missing = need - set(z.namelist())
          assert not missing, f"panel assets missing from wheel: {missing}"
          print("panel assets present in wheel")
          PY
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1

  sbom:
    name: SBOM (CycloneDX) → release asset
    runs-on: ubuntu-latest
    permissions:
      contents: write        # attach the SBOM to the GitHub Release (no id-token here)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Generate a CycloneDX SBOM of the shipped dependency set
        run: |
          python -m pip install --upgrade pip cyclonedx-bom
          # Install the package into a clean venv, then snapshot exactly that env —
          # so the SBOM reflects `pip install citevahti`, not the build tooling.
          python -m venv /tmp/sbomenv
          /tmp/sbomenv/bin/pip install .
          cyclonedx-py environment /tmp/sbomenv/bin/python \
            --of JSON --output-reproducible \
            -o "citevahti-${{ github.event.release.tag_name }}.cdx.json"
      - name: Attach the SBOM to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" citevahti-*.cdx.json --clobber
