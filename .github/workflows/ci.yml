name: CI

# Runs the promised offline checks on every push/PR: the Python test suite (fully
# offline — fake seams, no Zotero/BBT/PubMed/network), and the VS Code extension build.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: pytest (offline) · py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with all extras so every path is importable)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp,keyring,timestamp,docx]"
      - name: Run the offline test suite
        run: python -m pytest -q
      - name: Security-control regression suite (local trust boundary)
        run: python -m pytest -m security   # loopback CSRF, agent surface, tamper/integrity — see SECURITY.md
      - name: Probe + audit-chain smoke (no writes, no network)
        run: |
          python -m citevahti.cli --root "$RUNNER_TEMP/cv-smoke" init
          python -m citevahti.cli --root "$RUNNER_TEMP/cv-smoke" verify-audit

  vscode:
    name: VS Code extension compiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
      - name: Compile the extension
        working-directory: vscode-extension
        run: |
          npm install
          npm run compile
