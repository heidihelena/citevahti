<line x1="1072.3" y1="195.0" x2="1134.2" y2="195.0" stroke="#C5B8E8" stroke-width="1.8"/><path d="M 1134.2 190.0 L 1142.2 195.0 L 1134.2 200.0 Z" fill="#C5B8E8"/>
