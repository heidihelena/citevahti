<line x1="912.3" y1="378" x2="942.3" y2="378" stroke="#C5B8E8" stroke-width="1.5" stroke-dasharray="6 5"/><text x="1272" y="382" text-anchor="end" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="11.5" fill="#C5B8E8">dashed = AI opinion · solid = human-reviewed</text>
