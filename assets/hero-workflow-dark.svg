<rect x="900.2" y="303" width="6" height="6" rx="1.5" fill="#A2C05C" stroke="#A2C05C" stroke-width="1"/>
<text x="903.2" y="330" text-anchor="middle" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#C5B8E8">Undo</text>
