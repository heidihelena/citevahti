<rect x="222.9" y="158" width="128.8" height="74" rx="8" fill="#362B4F" stroke="#C5B8E8" stroke-width="1.5"/>
<text x="287.3" y="190.0" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#F2EFF8">Source</text>
<text x="287.3" y="211.0" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#F2EFF8">evidence</text>
<line x1="355.7" y1="195.0" x2="417.6" y2="195.0" stroke="#C5B8E8" stroke-width="1.8"/><path d="M 417.6 190.0 L 425.6 195.0 L 417.6 200.0 Z" fill="#C5B8E8"/>
