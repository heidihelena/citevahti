<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 400" role="img" aria-labelledby="hero-title hero-desc">
<title id="hero-title">CiteVahti workflow</title>
<desc id="hero-desc">A claim from the manuscript is paired with source evidence; the human rates support first, a blinded AI gives a second opinion, agreement or adjudication follows, and the decision is stored in a hash-chained audit record.</desc>
<rect x="0.5" y="0.5" width="1319" height="399" rx="12" fill="#2D2440" stroke="#453a5e"/>
<text x="48" y="66" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" letter-spacing="2.5" fill="#C5B8E8">CITATION INTEGRITY · LOCAL-FIRST</text>
<text x="48" y="104" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="-0.3" fill="#F2EFF8">Run unit tests on your citations</text>
<text x="1272" y="66" text-anchor="end" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="3" fill="#C5B8E8">VAHTIAN</text>
<rect x="48.0" y="158" width="100.0" height="74" rx="8" fill="#362B4F" stroke="#C5B8E8" stroke-width="1.5"/>
